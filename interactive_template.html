<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LQG Noise-State Game Explorer</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
       background: #fafafa; color: #333; }
.container { max-width: 1400px; margin: 0 auto; padding: 10px 20px; }
h1 { text-align: center; font-size: 1.5em; margin: 10px 0 5px; }
.sliders { display: flex; gap: 20px; margin: 10px 0; flex-wrap: wrap; }
.slider-group { flex: 1; min-width: 200px; }
.slider-group label { font-size: 0.85em; font-weight: 600; display: block; margin-bottom: 2px; }
.slider-row { display: flex; align-items: center; gap: 8px; }
.slider-row input[type=range] { flex: 1; }
.slider-row .val { font-family: monospace; font-size: 0.9em; min-width: 3em; text-align: right; }
#status { text-align: center; font-family: monospace; font-size: 0.8em; color: #888;
           padding: 5px; margin: 5px 0; }
.section-title { text-align: center; font-size: 1.1em; font-weight: 600;
                  margin-top: 20px; padding-top: 12px; border-top: 2px solid #ddd; color: #444; }
.plot { width: 100%; }
#loading { text-align: center; padding: 40px; font-size: 1.2em; color: #999; }
</style>
</head>
<body>
<div class="container">
<h1>Decentralized LQG Noise-State Game Explorer</h1>
<div id="loading">Loading solver (WASM)...</div>

<div id="app" style="display:none">
<div class="sliders">
  <div class="slider-group">
    <label>p&#x2081; (player 1 precision)</label>
    <div class="slider-row">
      <input type="range" id="sl-p1" min="0.5" max="20" step="0.5" value="3">
      <span class="val" id="val-p1">3.0</span>
    </div>
  </div>
  <div class="slider-group">
    <label>p&#x2082; (player 2 precision)</label>
    <div class="slider-row">
      <input type="range" id="sl-p2" min="0.5" max="20" step="0.5" value="3">
      <span class="val" id="val-p2">3.0</span>
    </div>
  </div>
  <div class="slider-group">
    <label>b&#x2081; (player 1 target)</label>
    <div class="slider-row">
      <input type="range" id="sl-b1" min="-3" max="3" step="0.1" value="1">
      <span class="val" id="val-b1">1.0</span>
    </div>
  </div>
  <div class="slider-group">
    <label>b&#x2082; (player 2 target)</label>
    <div class="slider-row">
      <input type="range" id="sl-b2" min="-3" max="3" step="0.1" value="-1">
      <span class="val" id="val-b2">-1.0</span>
    </div>
  </div>
</div>
<div id="status"></div>

<div class="section-title">Sweep over p&#x2082;</div>
<div id="plot-costs" class="plot"></div>
<div id="plot-barD1-sweep" class="plot"></div>
<div id="plot-wedges-sweep" class="plot"></div>

<div class="section-title">Single Equilibrium Detail</div>
<div id="plot-residual" class="plot"></div>
<div id="plot-controls" class="plot"></div>
<div id="plot-X" class="plot"></div>
<div id="plot-D1" class="plot"></div>
<div id="plot-D2" class="plot"></div>
<div id="plot-calD1" class="plot"></div>
<div id="plot-wedges" class="plot"></div>
</div>
</div>

<script>
/* SOLVER_JS_INLINE */
</script>

<script>
// --- WASM solver interface ---
let Module = null;
let solveSingle, solveSweep, wasmMalloc, wasmFree;

const N = 40;
const SWEEP_P2 = [0.5, 1, 1.5, 2, 3, 4, 5, 7, 10, 15, 20];

// Viridis-ish colors
function viridisColor(frac) {
    const h = 0.75 - 0.55 * frac;
    const s = 0.7 + 0.2 * (1 - Math.abs(2 * frac - 1));
    const v = 0.5 + 0.4 * frac;
    return hsvToRgb(h, s, v);
}
function plasmaColor(frac) {
    const h = 0.83 - 0.75 * frac;
    return hsvToRgb(Math.max(0, Math.min(1, h)), 0.85, 0.5 + 0.45 * frac);
}
function hsvToRgb(h, s, v) {
    h = ((h % 1) + 1) % 1;
    const i = Math.floor(h * 6), f = h * 6 - i;
    const p = v * (1 - s), q = v * (1 - f * s), t = v * (1 - (1 - f) * s);
    let r, g, b;
    switch (i % 6) {
        case 0: r=v; g=t; b=p; break; case 1: r=q; g=v; b=p; break;
        case 2: r=p; g=v; b=t; break; case 3: r=p; g=q; b=v; break;
        case 4: r=t; g=p; b=v; break; case 5: r=v; g=p; b=q; break;
    }
    return `rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`;
}

const VIRIDIS = Array.from({length: N}, (_, i) => viridisColor(i / (N - 1)));

function callSingle(p1, p2, b1, b2) {
    const ptr = solveSingle(p1, p2, b1, b2);
    const json = Module.UTF8ToString(ptr);
    return JSON.parse(json);
}

function callSweep(p1, b1, b2, p2Arr) {
    const n = p2Arr.length;
    const buf = wasmMalloc(n * 8);
    const view = new Float64Array(Module.HEAPF64.buffer, buf, n);
    for (let i = 0; i < n; i++) view[i] = p2Arr[i];
    const ptr = solveSweep(p1, b1, b2, buf, n);
    wasmFree(buf);
    const json = Module.UTF8ToString(ptr);
    return JSON.parse(json);
}

// --- plot builders ---
const plotCfg = {responsive: true, displayModeBar: false};
const margin = {t: 40, b: 40, l: 55, r: 20};

function plotKernel(divId, t, kernelData, title) {
    const chLabels = ['W⁰', 'W¹', 'W²'];
    const traces = [];
    const step = Math.max(1, Math.floor(N / 15));
    for (let ch = 0; ch < 3; ch++) {
        const chData = kernelData['ch' + ch];
        for (let ti = 0; ti < N; ti += step) {
            traces.push({
                x: t.slice(0, ti + 1), y: chData[ti].slice(0, ti + 1),
                mode: 'lines', line: {color: VIRIDIS[ti], width: 1.5},
                showlegend: false, xaxis: 'x' + (ch + 1), yaxis: 'y' + (ch + 1),
                hovertemplate: `t=${t[ti].toFixed(3)}<br>s=%{x:.3f}<br>val=%{y:.4g}`,
            });
        }
    }
    const layout = {
        height: 300, margin,
        grid: {rows: 1, columns: 3, pattern: 'independent'},
        annotations: chLabels.map((l, i) => ({
            text: `${title} ${l}`, xref: 'paper', yref: 'paper',
            x: (i + 0.5) / 3, y: 1.08, showarrow: false, font: {size: 13},
        })),
    };
    for (let i = 1; i <= 3; i++) layout['xaxis' + i] = {title: 's'};
    Plotly.react(divId, traces, layout, plotCfg);
}

function plotResidual(divId, data) {
    const iters = data.residuals.map((_, i) => i);
    Plotly.react(divId, [{x: iters, y: data.residuals, mode: 'lines', line: {width: 2}}], {
        height: 270, margin,
        title: `Picard Residual (${data.n_iters} iterations)`,
        yaxis: {type: 'log', title: 'Relative residual'}, xaxis: {title: 'Iteration'},
    }, plotCfg);
}

function plotControls(divId, data) {
    const t = data.t;
    const effort = data.barD1.map((d, i) => Math.abs(d) + Math.abs(data.barD2[i]));
    const effortPi = data.barD1_pi.map(d => 2 * Math.abs(d));

    const traces = [
        {x: t, y: data.barD1, name: 'D̄¹', line: {width: 2}, xaxis: 'x1', yaxis: 'y1'},
        {x: t, y: data.barD2, name: 'D̄²', line: {width: 2, dash: 'dash'}, xaxis: 'x1', yaxis: 'y1'},
        {x: t, y: data.barD1_pi, name: 'Perfect', line: {width: 1.5, dash: 'dot', color: 'gray'}, xaxis: 'x1', yaxis: 'y1'},
        {x: t, y: data.barX, name: 'X̄', line: {width: 2}, showlegend: false, xaxis: 'x2', yaxis: 'y2'},
        {x: t, y: data.barX_pi, line: {width: 1.5, dash: 'dot', color: 'gray'}, showlegend: false, xaxis: 'x2', yaxis: 'y2'},
        {x: t, y: effort, name: 'Effort', line: {width: 2}, showlegend: false, xaxis: 'x3', yaxis: 'y3'},
        {x: t, y: effortPi, line: {width: 1.5, dash: 'dot', color: 'gray'}, showlegend: false, xaxis: 'x3', yaxis: 'y3'},
    ];
    const layout = {
        height: 300, margin, grid: {rows: 1, columns: 3, pattern: 'independent'},
        annotations: ['Mean Controls', 'Mean State', 'Aggregate Effort'].map((l, i) => ({
            text: l, xref: 'paper', yref: 'paper',
            x: (i + 0.5) / 3, y: 1.08, showarrow: false, font: {size: 13},
        })),
    };
    for (let i = 1; i <= 3; i++) layout['xaxis' + i] = {title: 't'};
    Plotly.react(divId, traces, layout, plotCfg);
}

function plotWedges(divId, data) {
    const t = data.t;
    Plotly.react(divId, [
        {x: t, y: data.V1, name: 'V¹', line: {width: 2}, xaxis: 'x1', yaxis: 'y1'},
        {x: t, y: data.V2, name: 'V²', line: {width: 2}, xaxis: 'x2', yaxis: 'y2'},
    ], {
        height: 270, margin, grid: {rows: 1, columns: 2, pattern: 'independent'},
        annotations: ['Player 1 wedge V¹(t)', 'Player 2 wedge V²(t)'].map((l, i) => ({
            text: l, xref: 'paper', yref: 'paper',
            x: (i + 0.5) / 2, y: 1.08, showarrow: false, font: {size: 13},
        })),
        xaxis1: {title: 't'}, xaxis2: {title: 't'},
        shapes: [{type: 'line', x0: 0, x1: 1, y0: 0, y1: 0, line: {dash: 'dot', color: 'gray', width: 1}, xref: 'x1', yref: 'y1'},
                 {type: 'line', x0: 0, x1: 1, y0: 0, y1: 0, line: {dash: 'dot', color: 'gray', width: 1}, xref: 'x2', yref: 'y2'}],
    }, plotCfg);
}

function plotCosts(divId, sweep) {
    const s = sweep.sweeps;
    const p2 = s.map(v => v.p2);
    const traces = [
        {x: p2, y: s.map(v => v.J1_priv), name: 'J¹ private', mode: 'lines+markers',
         line: {width: 2, color: '#1f77b4'}, marker: {size: 7}, xaxis: 'x1', yaxis: 'y1'},
        {x: p2, y: s.map(v => v.J1_pool), name: 'J¹ pooled', mode: 'lines+markers',
         line: {width: 2, color: '#1f77b4', dash: 'dash'}, marker: {size: 7, symbol: 'square'}, xaxis: 'x1', yaxis: 'y1'},
        {x: p2, y: s.map(v => v.J2_priv), name: 'J² private', mode: 'lines+markers',
         line: {width: 2, color: '#d62728'}, marker: {size: 7}, xaxis: 'x2', yaxis: 'y2'},
        {x: p2, y: s.map(v => v.J2_pool), name: 'J² pooled', mode: 'lines+markers',
         line: {width: 2, color: '#d62728', dash: 'dash'}, marker: {size: 7, symbol: 'square'}, xaxis: 'x2', yaxis: 'y2'},
    ];
    Plotly.react(divId, traces, {
        height: 350, margin: {...margin, t: 50},
        title: `Costs: p₁=${sweep.p1.toFixed(1)}, b₁=${sweep.b1.toFixed(1)}, b₂=${sweep.b2.toFixed(1)} (solid=private, dashed=pooled)`,
        grid: {rows: 1, columns: 2, pattern: 'independent'},
        annotations: ['Player 1 Cost J¹', 'Player 2 Cost J²'].map((l, i) => ({
            text: l, xref: 'paper', yref: 'paper',
            x: (i + 0.5) / 2, y: 1.05, showarrow: false, font: {size: 13},
        })),
        xaxis1: {title: 'p₂'}, xaxis2: {title: 'p₂'},
        yaxis1: {title: 'Cost'}, yaxis2: {title: 'Cost'},
    }, plotCfg);
}

function plotBarD1Sweep(divId, sweep) {
    const t = sweep.t;
    const s = sweep.sweeps;
    const p2min = Math.min(...s.map(v => v.p2)), p2max = Math.max(...s.map(v => v.p2));
    const traces = s.map(v => ({
        x: t, y: v.barD1, name: `p₂=${v.p2.toFixed(1)}`,
        line: {width: 2, color: plasmaColor((v.p2 - p2min) / Math.max(1, p2max - p2min))},
        hovertemplate: `p₂=${v.p2.toFixed(1)}<br>t=%{x:.3f}<br>D̄¹=%{y:.4g}`,
    }));
    traces.push({x: t, y: sweep.barD1_pi, name: 'Perfect info',
                 line: {width: 2, dash: 'dash', color: 'gray'}});
    Plotly.react(divId, traces, {
        height: 350, margin: {...margin, t: 50},
        title: `Mean Control D̄¹(t) — p₁=${sweep.p1.toFixed(1)} fixed`,
        xaxis: {title: 't'}, yaxis: {title: 'D̄¹(t)'},
    }, plotCfg);
}

function plotWedgesSweep(divId, sweep) {
    const t = sweep.t;
    const s = sweep.sweeps;
    const p2min = Math.min(...s.map(v => v.p2)), p2max = Math.max(...s.map(v => v.p2));
    const traces = [];
    for (const v of s) {
        const color = plasmaColor((v.p2 - p2min) / Math.max(1, p2max - p2min));
        traces.push({x: t, y: v.V1, name: `p₂=${v.p2.toFixed(1)}`,
                     line: {width: 1.8, color}, legendgroup: `p${v.p2}`,
                     xaxis: 'x1', yaxis: 'y1'});
        traces.push({x: t, y: v.V2, name: `p₂=${v.p2.toFixed(1)}`,
                     line: {width: 1.8, color}, legendgroup: `p${v.p2}`,
                     showlegend: false, xaxis: 'x2', yaxis: 'y2'});
    }
    Plotly.react(divId, traces, {
        height: 330, margin: {...margin, t: 50},
        title: `Information Wedges — p₁=${sweep.p1.toFixed(1)} fixed`,
        grid: {rows: 1, columns: 2, pattern: 'independent'},
        annotations: ['Player 1 wedge V¹(t)', 'Player 2 wedge V²(t)'].map((l, i) => ({
            text: l, xref: 'paper', yref: 'paper',
            x: (i + 0.5) / 2, y: 1.05, showarrow: false, font: {size: 13},
        })),
        xaxis1: {title: 't'}, xaxis2: {title: 't'},
    }, plotCfg);
}

// --- app logic ---
let debounceTimer = null;

function getParams() {
    return {
        p1: parseFloat(document.getElementById('sl-p1').value),
        p2: parseFloat(document.getElementById('sl-p2').value),
        b1: parseFloat(document.getElementById('sl-b1').value),
        b2: parseFloat(document.getElementById('sl-b2').value),
    };
}

function updateLabels() {
    const p = getParams();
    document.getElementById('val-p1').textContent = p.p1.toFixed(1);
    document.getElementById('val-p2').textContent = p.p2.toFixed(1);
    document.getElementById('val-b1').textContent = p.b1.toFixed(1);
    document.getElementById('val-b2').textContent = p.b2.toFixed(1);
}

function updateAll() {
    const p = getParams();
    const t0 = performance.now();

    // Single solve
    const data = callSingle(p.p1, p.p2, p.b1, p.b2);
    const singleMs = performance.now() - t0;

    plotResidual('plot-residual', data);
    plotControls('plot-controls', data);
    plotKernel('plot-X', data.t, data.X, 'X(t,s)');
    plotKernel('plot-D1', data.t, data.D1, 'D¹(t,s)');
    plotKernel('plot-D2', data.t, data.D2, 'D²(t,s)');
    plotKernel('plot-calD1', data.t, data.calD1, '𝒟¹(t,s)');
    plotWedges('plot-wedges', data);

    // Sweep
    const t1 = performance.now();
    const sweep = callSweep(p.p1, p.b1, p.b2, SWEEP_P2);
    const sweepMs = performance.now() - t1;

    plotCosts('plot-costs', sweep);
    plotBarD1Sweep('plot-barD1-sweep', sweep);
    plotWedgesSweep('plot-wedges-sweep', sweep);

    const totalMs = performance.now() - t0;
    document.getElementById('status').textContent =
        `p₁=${p.p1} p₂=${p.p2} b₁=${p.b1} b₂=${p.b2} | ` +
        `${data.n_iters} iters | J¹=${data.J1.toFixed(4)} J²=${data.J2.toFixed(4)} | ` +
        `single ${singleMs.toFixed(0)}ms + sweep ${sweepMs.toFixed(0)}ms = ${totalMs.toFixed(0)}ms`;
}

function onSliderChange() {
    updateLabels();
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(updateAll, 150);
}

// --- init ---
SolverModule().then(mod => {
    Module = mod;
    solveSingle = mod.cwrap('solve_single', 'number', ['number', 'number', 'number', 'number']);
    solveSweep = mod.cwrap('solve_sweep', 'number', ['number', 'number', 'number', 'number', 'number']);
    wasmMalloc = mod._malloc;
    wasmFree = mod._free;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    for (const id of ['sl-p1', 'sl-p2', 'sl-b1', 'sl-b2']) {
        document.getElementById(id).addEventListener('input', onSliderChange);
    }
    updateLabels();
    updateAll();
});
</script>
</body>
</html>
